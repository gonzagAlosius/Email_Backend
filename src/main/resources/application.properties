server.port=8080
spring.application.name=Email_backend

# BLUEHOST SMTP CONFIG (For Sending - Default values, dynamically overridden for users)
spring.mail.host=mail.botsuat.com
spring.mail.port=587
# spring.mail.username=
# spring.mail.password=

# BLUEHOST IMAP CONFIG (For Loading Inbox)
mail.imap.host=mail.botsuat.com
mail.imap.port=993
mail.imap.sentfolder=Sent

# BLUEHOST cPanel API CONFIG (For Creating Email Accounts via App Signup)
cpanel.host=mail.botsuat.com
cpanel.port=2083
cpanel.username=YOUR_CPANEL_USERNAME
cpanel.token=YOUR_CPANEL_API_TOKEN

# Mail Protocol Properties
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=mail.botsuat.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
