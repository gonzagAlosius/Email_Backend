microsoft.oauth.scope=${MICROSOFT_OAUTH_SCOPE:openid profile email https://outlook.office.com/IMAP.AccessAsUser.All https://outlook.office.com/SMTP.Send offline_access}
microsoft.oauth.domains=${MICROSOFT_OAUTH_DOMAINS:botsedge.ai}


